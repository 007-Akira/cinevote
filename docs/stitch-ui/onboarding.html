<style>

<h1 class="font-headline-lg-mobile text-headline-lg-mobile tracking-tighter text-primary-container drop-shadow-[0_0_10px_rgba(229,9,20,0.6)]">
            CINEVOTE
        </h1>
<button class="text-on-surface-variant hover:text-primary-container transition-colors scale-95 duration-200">
<span class="material-symbols-outlined">notifications</span>
</button>
</header>
<!-- Overlay -->
<div class="fixed inset-0 bg-black/80 z-40 backdrop-blur-sm transition-opacity"></div>

<div class="px-container-margin pb-xl">
<!-- Header -->
<div class="mb-lg">
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface mb-xs uppercase tracking-wide drop-shadow-[0_0_15px_rgba(229,9,20,0.3)]">
                    Before you vote
                </h2>
<p class="font-body-md text-body-md text-on-surface-variant opacity-80">
                    Tell us who you are so we can count your vote.
                </p>
</div>
<!-- Form -->
<form class="space-y-md">
<!-- Name Field -->
<div>
<label class="block font-label-sm text-label-sm uppercase tracking-widest text-on-surface-variant mb-xs ml-1" for="name">Name</label>
<input class="input-field w-full h-14 px-4 rounded font-body-md text-body-md text-on-surface placeholder:text-surface-variant" id="name" placeholder="Enter your full name" type="text"/>
</div>
<!-- Year of Study -->
<div>
<label class="block font-label-sm text-label-sm uppercase tracking-widest text-on-surface-variant mb-xs ml-1" for="year">Year of Study</label>
<select class="input-field form-select w-full h-14 px-4 rounded font-body-md text-body-md text-on-surface" id="year">
<option class="bg-surface-container text-surface-variant" disabled="" selected="" value="">Select Year</option>
<option class="bg-surface-container" value="1">Freshman</option>
<option class="bg-surface-container" value="2">Sophomore</option>
<option class="bg-surface-container" value="3">Junior</option>
<option class="bg-surface-container" value="4">Senior</option>
<option class="bg-surface-container" value="5">Graduate</option>
</select>
</div>
<!-- Department -->
<div>
<label class="block font-label-sm text-label-sm uppercase tracking-widest text-on-surface-variant mb-xs ml-1" for="department">Department</label>
<select class="input-field form-select w-full h-14 px-4 rounded font-body-md text-body-md text-on-surface" id="department">
<option class="bg-surface-container text-surface-variant" disabled="" selected="" value="">Select Department</option>
<option class="bg-surface-container" value="film">Film &amp; Media</option>
<option class="bg-surface-container" value="arts">Fine Arts</option>
<option class="bg-surface-container" value="design">Design</option>
<option class="bg-surface-container" value="other">Other</option>
</select>
</div>

<button class="w-full h-14 mt-lg bg-primary-container text-on-primary-container font-label-md text-label-md uppercase tracking-widest rounded flex items-center justify-center hover:bg-inverse-primary transition-colors shadow-[0_0_20px_rgba(229,9,20,0.4)] active:scale-[0.98]" type="button">
                    Continue
                </button>
</form>
