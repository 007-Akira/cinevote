<style>

            position: fixed;
            top: 0;
            left: 0;
            width: 100%;

            background-color: rgba(9, 9, 11, 0.7);
            backdrop-filter: blur(20px);

            box-shadow: 0 0 25px rgba(229, 9, 20, 0.5);

<body class="bg-background text-on-surface antialiased overflow-x-hidden min-h-screen flex flex-col font-body-md">
<div class="film-grain"></div>
<!-- Top Navigation (Transactional, hide bottom nav) -->
<header class="fixed top-0 w-full z-50 bg-surface/70 backdrop-blur-xl border-b border-primary-container/20 shadow-[0_4_30px_rgba(0,0,0,0.5)] flex justify-between items-center px-container-margin h-16">
<button aria-label="Go back" class="text-primary-container hover:text-primary-container transition-colors scale-95 duration-200" type="button">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">arrow_back</span>
</button>
<span class="font-headline-lg-mobile text-headline-lg-mobile tracking-tighter text-primary-container drop-shadow-[0_0_10px_rgba(229,9,20,0.6)]">CINEVOTE</span>
<div class="w-6"></div> <!-- Spacer for centering -->
</header>
<main class="flex-1 mt-16 px-container-margin pt-xl pb-lg flex flex-col justify-center min-h-[calc(100vh-64px)] relative" id="main-content">
<!-- Confirmation View -->
<div class="w-full max-w-md mx-auto transition-opacity duration-300" id="confirmation-view">
<div class="text-center mb-10">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile mb-4 text-on-surface">Confirm your vote?</h1>
<p class="font-body-md text-body-md text-on-surface-variant max-w-[280px] mx-auto">You are voting for this movie. This cannot be changed later.</p>
</div>
<!-- Movie Preview Card -->
<div class="glass-card rounded-xl p-4 mb-xl relative overflow-hidden group border-l-2 border-l-primary-container">
<div class="flex items-center gap-md">
<div class="w-24 h-36 rounded-lg overflow-hidden shrink-0 relative bg-surface-container-high">
<img alt="Movie Poster" class="w-full h-full object-cover" data-alt="A cinematic, high-contrast promotional poster for a gritty neon-noir thriller film. The image features a solitary figure standing in rain-slicked alleyway illuminated by intense crimson red neon signs. The aesthetic is extremely dark, utilizing deep true blacks and stark white highlights to create a moody, tense atmosphere. Shot in a wide aspect ratio mimicking classic cinema." src="https://lh3.googleusercontent.com/aida-public/AB6AXuD_rkMy-Rnhj-tLJr4DVFazYLApgit9DW2TKnWDTQuA1GTHdu6-r4UvkudE1YhSbPj6kjiGAG_Qvt59OKtRjYgCl9pfLupn4dVvNzRbEfeGCe6G6AVMow26DpIatD8jXJjmbYyvMmQx1As89P7X7pd8pk27U2Ni1CiYuf_MxGawvnLiEj3KxHhVz6LQiSSvJyijLyy2v75sxCUkw_lBF-b6G-9zLV9TQL7joXKlw4JlndiucT2VE_nCTJfZE9wlGv76mIZOoXUOzqmn"/>
</div>
<div class="flex-1">
<h2 class="font-headline-md text-headline-md mb-2 text-on-surface">NEON DRIFTER</h2>
<div class="flex items-center gap-2 text-primary-container mb-2">
<span class="material-symbols-outlined text-[16px]" style="font-variation-settings: 'FILL' 1;">star</span>
<span class="font-label-md text-label-md">9.2</span>
</div>
<p class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-widest">Sci-Fi / Thriller</p>
</div>
</div>
</div>
<!-- Actions -->
<div class="flex flex-col gap-sm mt-auto">
<button class="w-full bg-primary-container text-on-primary-container font-label-md text-label-md uppercase tracking-widest py-4 rounded-DEFAULT shadow-[0_0_15px_rgba(229,9,20,0.4)] hover:bg-inverse-primary transition-all active:scale-95" id="confirm-btn" type="button">
                    Confirm Vote
                </button>
<button class="w-full border-2 border-on-surface text-on-surface font-label-md text-label-md uppercase tracking-widest py-4 rounded-DEFAULT hover:border-primary-container hover:text-primary-container transition-all active:scale-95 bg-transparent" type="button">
                    Cancel
                </button>
</div>
</div>
<!-- Success View (Hidden initially) -->
<div class="w-full max-w-md mx-auto hidden opacity-0 transition-opacity duration-500 flex flex-col items-center justify-center text-center" id="success-view">
<div class="w-24 h-24 rounded-full bg-primary-container/20 flex items-center justify-center mb-8 glow-red relative">
<div class="absolute inset-0 rounded-full border border-primary-container animate-ping opacity-75"></div>
<span class="material-symbols-outlined text-[48px] text-primary-container" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile mb-4 text-on-surface drop-shadow-[0_0_8px_rgba(229,9,20,0.4)]">Your vote has been recorded</h1>
<p class="font-body-md text-body-md text-on-surface-variant mb-xl">Final screening details will be announced soon.</p>
<!-- Selected Movie Minimal Card -->
<div class="glass-card rounded-xl p-4 w-full mb-10 glow-red border-primary-container/50">
<div class="flex items-center gap-md">
<div class="w-16 h-24 rounded-DEFAULT overflow-hidden shrink-0 relative bg-surface-container-high">
<img alt="Movie Poster" class="w-full h-full object-cover" data-alt="A cinematic, high-contrast promotional poster for a gritty neon-noir thriller film. The image features a solitary figure standing in rain-slicked alleyway illuminated by intense crimson red neon signs. The aesthetic is extremely dark, utilizing deep true blacks and stark white highlights to create a moody, tense atmosphere. Shot in a wide aspect ratio mimicking classic cinema." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAu47cRR8KsoCBo7TAOsyHH5_jPaUUH-_6CRYxRHRGziESWKfVb-Ig4a9MmjhBn0yRPCBMeSmiRB1eMStEiWfeUzMrpy2vufLiSMM6DZesbzaw9OkUAN6OpvoMvpoHy44mZOjOnlYqGmD5pO6h3IkPOVYSfQTJJ8UUKHjZ-A2aaqgACXfdPsUD1WNdKjIaMH9viTynyBZdfDEmYOTyXCieJSgkqhLauY3fn-Zd7Hc5Jg-7FbZnDSS2F0N-EuADj6bSaz5swLIPEROL0"/>
</div>
<div class="text-left flex-1">
<p class="font-label-sm text-label-sm text-primary-container uppercase tracking-widest mb-1">VOTED FOR</p>
<h2 class="font-headline-md text-headline-md text-on-surface">NEON DRIFTER</h2>
</div>
</div>
</div>
<button class="w-full border-2 border-primary-container text-primary-container font-label-md text-label-md uppercase tracking-widest py-4 rounded-DEFAULT hover:bg-primary-container hover:text-on-primary-container transition-all active:scale-95 bg-transparent shadow-[0_0_15px_rgba(229,9,20,0.2)]" type="button">
                Back to Home
            </button>
</div>
</main>
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const confirmBtn = document.getElementById('confirm-btn');
            const confirmationView = document.getElementById('confirmation-view');
            const successView = document.getElementById('success-view');

            confirmBtn.addEventListener('click', () => {
                // Fade out confirmation
                confirmationView.style.opacity = '0';
                
                setTimeout(() => {
                    confirmationView.classList.add('hidden');
                    successView.classList.remove('hidden');
                    
                    // Trigger reflow
                    void successView.offsetWidth;
                    
                    // Fade in success
                    successView.style.opacity = '1';
                }, 300);
            });
        });
    </script>
